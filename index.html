<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Groq AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="header">⚡ Groq AI Chat</div>

  <div id="chat" class="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Tulis pesan..." />
    <button onclick="send()">Kirim</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMessage("user", text);
  input.value = "";

  addMessage("ai", "⏳ mengetik...");

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt: text })
  });

  const data = await res.json();

  // hapus loading terakhir
  document.querySelector(".ai:last-child").remove();

  addMessage("ai", data.result || "error");
}

function addMessage(role, text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = role;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
